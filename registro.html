<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Registro</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">

  <main class="min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-11 col-md-9 col-lg-6">
          <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h1 class="h3 fw-bold text-primary mb-2">Crear cuenta</h1>
                <p class="text-muted mb-0">
                  Regístrate para descubrir, publicar o moderar eventos.
                </p>
              </div>

              <div id="registerMessage" class="alert d-none" role="alert"></div>

              <form id="registerForm">
                <div class="row g-3">
                  <div class="col-12">
                    <label for="name" class="form-label fw-semibold">Nombre</label>
                    <input id="name" name="name" type="text" class="form-control" required />
                  </div>

                  <div class="col-12">
                    <label for="email" class="form-label fw-semibold">Correo</label>
                    <input id="email" name="email" type="email" class="form-control" required />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" required />
                  </div>

                  <div class="col-12 col-md-6">
                    <label for="role" class="form-label fw-semibold">Rol</label>
                    <select id="role" name="role" class="form-select" required>
                      <option value="explorador">Explorador</option>
                      <option value="promotor">Promotor</option>
                      <option value="moderador">Moderador</option>
                    </select>
                  </div>

                  <div class="col-12">
                    <label for="zone" class="form-label fw-semibold">Zona</label>
                    <input id="zone" name="zone" type="text" class="form-control" required />
                  </div>
                </div>

                <div class="d-grid mt-4">
                  <button class="btn btn-primary btn-lg rounded-3" type="submit">
                    Registrarme
                  </button>
                </div>
              </form>

              <p class="text-center mt-4 mb-0">
                ¿Ya tienes cuenta?
                <a href="index.html" class="fw-semibold">Iniciar sesión</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
