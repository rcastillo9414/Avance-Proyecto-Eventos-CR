<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Iniciar sesión</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <main class="min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h1 class="h3 fw-bold text-primary mb-2">Iniciar sesión</h1>
                <p class="text-muted mb-0">
                  Accede a la plataforma colaborativa de eventos locales.
                </p>
              </div>

              <div id="loginMessage" class="alert d-none" role="alert"></div>

              <form id="loginForm">
                <div class="mb-3">
                  <label for="email" class="form-label fw-semibold">Correo</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-envelope"></i>
                    </span>
                    <input id="email" name="email" type="email" class="form-control" required />
                  </div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label fw-semibold">Contraseña</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input id="password" name="password" type="password" class="form-control" required />
                  </div>
                </div>

                <div class="d-grid">
                  <button class="btn btn-primary btn-lg rounded-3" type="submit">
                    Entrar
                  </button>
                </div>
              </form>

              <p class="text-center mt-4 mb-0">
                ¿No tienes cuenta?
                <a href="registro.html" class="fw-semibold">Registrarte</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
