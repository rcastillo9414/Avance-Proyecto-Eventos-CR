<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Eventos</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="dashboard.html">PartyCR</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
          <li class="nav-item"><a class="nav-link active" href="crear-evento.html">Crear evento</a></li>
          <li class="nav-item"><a class="nav-link" href="intinerarios.html">Intinerarios</a></li>
          <li class="nav-item"><a class="nav-link" href="moderation.html" id="validationLink">Validación</a></li>
          <li class="nav-item"><a class="nav-link" href="perfiles.html" id="usersLink">Perfiles</a></li>
          <li class="nav-item"><a class="nav-link" href="auditoria.html" id="auditLink">Auditoría</a></li>
          <li class="nav-item">
            <button id="logoutBtn" type="button" class="btn btn-outline-danger btn-sm mt-2 mt-lg-0">
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="mb-4">
      <div class="p-4 p-md-5 bg-primary-subtle rounded-4 shadow-sm border">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <h1 class="display-6 fw-bold text-primary mb-1">Eventos existentes</h1>
            <p class="text-muted mb-0">
              Consulta, filtra y abre el detalle de los eventos disponibles en tu zona.
            </p>
          </div>
          <div>
            <a href="crear-evento.html" class="btn btn-primary">
              <i class="bi bi-plus-circle me-2"></i>Nuevo evento
            </a>
          </div>
        </div>
      </div>
    </section>

    <div id="eventsMessage" class="alert d-none" role="alert"></div>

    <section class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">
        <h2 class="h4 fw-bold mb-3">Filtros</h2>

        <form id="filterEventsForm" class="row g-3">
          <div class="col-12 col-md-6 col-xl-3">
            <label for="filterStatus" class="form-label fw-semibold">Estado</label>
            <select id="filterStatus" class="form-select">
              <option value="">Todos</option>
              <option value="publicado">Oficialmente</option>
              <option value="por_verificar">Pendiente confirmación</option>
              <option value="cancelado">Cancelado</option>
              <option value="realizado">Realizado</option>
              <option value="rechazado">Rechazado</option>
            </select>
          </div>

          <div class="col-12 col-md-6 col-xl-3">
            <label for="filterZone" class="form-label fw-semibold">Zona</label>
            <input id="filterZone" type="text" class="form-control" />
          </div>

          <div class="col-12 col-md-6 col-xl-2">
            <label for="filterSourceType" class="form-label fw-semibold">Fuente</label>
            <select id="filterSourceType" class="form-select">
              <option value="">Todas</option>
              <option value="oficial">Oficial</option>
              <option value="comunitaria">Comunitaria</option>
            </select>
          </div>

          <div class="col-12 col-md-6 col-xl-2">
            <label for="filterCategory" class="form-label fw-semibold">Categoría</label>
            <input id="filterCategory" type="text" class="form-control" />
          </div>

          <div class="col-12 col-xl-2">
            <label for="filterPlaceName" class="form-label fw-semibold">Lugar</label>
            <input id="filterPlaceName" type="text" class="form-control" />
          </div>

          <div class="col-12 d-flex flex-wrap gap-2">
            <button class="btn btn-primary" type="submit">Filtrar</button>
            <button class="btn btn-outline-secondary" type="button" id="loadAllBtn">Cargar todos</button>
          </div>
        </form>
      </div>
    </section>

    <section>
      <h2 class="h4 fw-bold mb-3">Listado de eventos</h2>
      <div id="eventsList" class="row g-4"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/eventos.js"></script>
</body>
</html>
