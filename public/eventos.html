<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Eventos</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <header class="topbar sticky-top bg-white border-bottom shadow-sm">
    <div class="container py-3">
      <div class="topbar-content d-flex flex-column flex-lg-row align-items-center justify-content-between gap-3">
        <div class="brand fw-bold fs-4 text-primary">PartyCR</div>

        <nav class="nav-links d-flex flex-wrap justify-content-center gap-2">
          <a href="dashboard.html" class="btn btn-outline-primary btn-sm">Inicio</a>
          <a href="eventos.html" class="btn btn-primary btn-sm">Eventos</a>
          <a href="intinerarios.html" class="btn btn-outline-primary btn-sm">Itinerarios</a>
          <a href="moderation.html" class="btn btn-outline-primary btn-sm">Validacion</a>
          <button id="logoutBtn" type="button" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
        </nav>
      </div>
    </div>
  </header>

  <main class="container py-4">
    <section class="hero mb-4">
      <div class="hero-box p-4 p-md-5 rounded-4 shadow-sm border">
        <h1 class="mb-3">Gestión de eventos</h1>
        <p class="mb-0 text-muted">Crear, listar, actualizar, cancelar y cerrar eventos según tu rol.</p>
      </div>
    </section>

    <div id="eventsMessage" class="alert d-none" role="alert"></div>

    <section class="row g-4 mb-4">
      <div class="col-12 col-lg-6">
        <article class="card h-100 shadow-sm border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="h4 mb-4">Crear evento</h2>

            <form id="createEventForm">
              <div class="mb-3">
                <label for="title" class="form-label">Título</label>
                <input id="title" name="title" type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Descripción</label>
                <textarea id="description" name="description" class="form-control" rows="4" required></textarea>
              </div>

              <div class="mb-3">
                <label for="category" class="form-label">Categorías (separadas por coma)</label>
                <input id="category" name="category" type="text" class="form-control" placeholder="Cultura, Música" />
              </div>

              <div class="mb-3">
                <label for="date" class="form-label">Fecha y hora</label>
                <input id="date" name="date" type="datetime-local" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="zone" class="form-label">Zona</label>
                <input id="zone" name="zone" type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="placeName" class="form-label">Lugar</label>
                <input id="placeName" name="placeName" type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="address" class="form-label">Dirección</label>
                <input id="address" name="address" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="photoEvidence" class="form-label">URL o ruta de imagen</label>
                <input id="photoEvidence" name="photoEvidence" type="text" class="form-control" placeholder="https://... o /uploads/imagen.jpg" />
              </div>

              <button class="btn btn-primary w-100" type="submit">Crear evento</button>
            </form>
          </div>
        </article>
      </div>

      <div class="col-12 col-lg-6">
        <article class="card h-100 shadow-sm border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="h4 mb-4">Filtros</h2>

            <form id="filterEventsForm">
              <div class="mb-3">
                <label for="filterStatus" class="form-label">Estado</label>
                <select id="filterStatus" class="form-select">
                  <option value="">Todos</option>
                  <option value="publicado">Publicado</option>
                  <option value="por_verificar">Por verificar</option>
                  <option value="cancelado">Cancelado</option>
                  <option value="realizado">Realizado</option>
                  <option value="rechazado">Rechazado</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="filterZone" class="form-label">Zona</label>
                <input id="filterZone" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="filterSourceType" class="form-label">Fuente</label>
                <select id="filterSourceType" class="form-select">
                  <option value="">Todas</option>
                  <option value="oficial">Oficial</option>
                  <option value="comunitaria">Comunitaria</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="filterCategory" class="form-label">Categoría</label>
                <input id="filterCategory" type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label for="filterPlaceName" class="form-label">Lugar</label>
                <input id="filterPlaceName" type="text" class="form-control" />
              </div>

              <div class="d-flex flex-column flex-sm-row gap-2">
                <button class="btn btn-primary flex-fill" type="submit">Filtrar</button>
                <button class="btn btn-outline-secondary flex-fill" type="button" id="loadAllBtn">Ver todos</button>
              </div>
            </form>
          </div>
        </article>
      </div>
    </section>

    <section>
      <h2 class="h4 mb-3">Listado de eventos</h2>
      <div id="eventsList" class="row g-4"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/eventos.js"></script>
</body>
</html>
