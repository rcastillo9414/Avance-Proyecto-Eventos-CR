<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Validación</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="dashboard.html">PartyCR</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
          <li class="nav-item"><a class="nav-link active" href="crear-evento.html">Crear evento</a></li>
          <li class="nav-item"><a class="nav-link" href="intinerarios.html">Intinerarios</a></li>
          <li class="nav-item"><a class="nav-link" href="moderation.html" id="validationLink">Validación</a></li>
          <li class="nav-item"><a class="nav-link" href="perfiles.html" id="usersLink">Perfiles</a></li>
          <li class="nav-item"><a class="nav-link" href="auditoria.html" id="auditLink">Auditoría</a></li>
          <li class="nav-item">
            <button id="logoutBtn" type="button" class="btn btn-outline-danger btn-sm mt-2 mt-lg-0">
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="mb-4">
      <div class="p-4 p-md-5 bg-primary-subtle rounded-4 shadow-sm border">
        <h1 class="display-6 fw-bold text-primary">Validación de eventos</h1>
        <p class="text-muted mb-0">
          El validador revisa eventos pendientes, rechazados y posibles duplicados.
        </p>
      </div>
    </section>

    <div id="moderationMessage" class="alert d-none" role="alert"></div>

    <section class="mb-5">
      <h2 class="h4 fw-bold mb-3">Eventos pendientes</h2>
      <div id="pendingEvents" class="row g-4"></div>
    </section>

    <section class="mb-5">
      <h2 class="h4 fw-bold mb-3">Eventos rechazados</h2>
      <div id="rejectedEvents" class="row g-4"></div>
    </section>

    <section class="mb-4">
      <h2 class="h4 fw-bold mb-3">Buscar posibles duplicados</h2>

      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
          <form id="duplicateSearchForm" class="row g-3">
            <div class="col-12 col-md-4">
              <label for="duplicateZone" class="form-label fw-semibold">Zona</label>
              <input id="duplicateZone" type="text" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="duplicateTitle" class="form-label fw-semibold">Título</label>
              <input id="duplicateTitle" type="text" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label for="duplicatePlaceName" class="form-label fw-semibold">Lugar</label>
              <input id="duplicatePlaceName" type="text" class="form-control" />
            </div>

            <div class="col-12">
              <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section>
      <h2 class="h4 fw-bold mb-3">Resultados de duplicados</h2>
      <div id="duplicateResults" class="row g-4"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/moderation.js"></script>
</body>
</html>
