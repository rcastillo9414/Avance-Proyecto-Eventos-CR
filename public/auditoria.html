<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyCR - Auditoría</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="dashboard.html">PartyCR</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
          <li class="nav-item"><a class="nav-link" href="intinerarios.html">Itinerarios</a></li>
          <li class="nav-item"><a class="nav-link" href="moderation.html" id="validationLink">Validación</a></li>
          <li class="nav-item"><a class="nav-link" href="perfiles.html" id="usersLink">Perfiles</a></li>
          <li class="nav-item"><a class="nav-link active" href="auditoria.html" id="auditLink">Auditoría</a></li>
          <li class="nav-item">
            <button id="logoutBtn" type="button" class="btn btn-outline-danger btn-sm mt-2 mt-lg-0">
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="mb-4">
      <div class="p-4 p-md-5 bg-primary-subtle rounded-4 shadow-sm border">
        <h1 class="display-6 fw-bold text-primary">Auditoría del sistema</h1>
        <p class="text-muted mb-0">
          Consulta las acciones registradas dentro de tu zona.
        </p>
      </div>
    </section>

    <div id="auditMessage" class="alert d-none" role="alert"></div>

    <section class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">
        <h2 class="h4 fw-bold mb-3">Filtros</h2>

        <form id="auditFiltersForm" class="row g-3">
          <div class="col-12 col-md-4">
            <label for="filterAction" class="form-label fw-semibold">Acción</label>
            <input id="filterAction" type="text" class="form-control" placeholder="CREATE_EVENT" />
          </div>

          <div class="col-12 col-md-4">
            <label for="filterEntityType" class="form-label fw-semibold">Entidad</label>
            <select id="filterEntityType" class="form-select">
              <option value="">Todas</option>
              <option value="Event">Event</option>
              <option value="User">User</option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label for="filterLimit" class="form-label fw-semibold">Límite</label>
            <select id="filterLimit" class="form-select">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
            </select>
          </div>

          <div class="col-12 d-flex flex-wrap gap-2">
            <button class="btn btn-primary" type="submit">Aplicar filtros</button>
            <button class="btn btn-outline-secondary" type="button" id="reloadAuditBtn">Recargar</button>
          </div>
        </form>
      </div>
    </section>

    <section>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 fw-bold mb-0">Registros</h2>
        <span id="auditCount" class="text-muted">0 resultados</span>
      </div>

      <div id="auditList" class="d-grid gap-3">
        <p class="text-muted mb-0">Cargando auditoría...</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auditoria.js"></script>
</body>
</html>
